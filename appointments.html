<!DOCTYPE html>
<html lang="en">
<head>

    <title>Appointments | Royal Thread</title>

</head>
<body>
    <header><h1>Royal Thread Fashion House</h1></header>
    <div class="marquee-bar"><marquee>✨ Book your private fitting session today! ✨</marquee></div>
    <nav>
        <a href="index.html">Home</a>

        <a href="trustees.html">Trustees</a>

    <main class="container">
        <h2>Book an Appointment</h2>
        <form onsubmit="confirmBooking(); return false;">
            <label>Full Name:</label><br>
            <input type="text" required style="width:100%; padding:8px; margin:10px 0;"><br>
            <label>Service Type:</label><br>
            <select style="width:100%; padding:8px; margin:10px 0;">
                <option>Bespoke Tailoring</option>
                <option>Wedding Consultation</option>
                <option>Fabric Selection</option>
            </select><br>
            <button type="submit" style="background:#2c3e50; color:white; padding:10px 20px; border:none; cursor:pointer;">Confirm Booking</button>
        </form>
    </main>
